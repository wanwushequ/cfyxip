<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate_204真链接测试网址</title>
    <style>
        :root {
            --primary-color: #3b82f6; 
            --bg-color: #0f172a;      
            --card-bg: #1e293b;       
            --text-color: #f1f5f9;    
            --text-muted: #94a3b8;    
            --border-color: #334155;  
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            flex-grow: 1;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        .table-container {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
            overflow: hidden;
            margin-bottom: 40px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: #1e293b;
            color: var(--primary-color);
            padding: 15px;
            font-weight: 600;
            border-bottom: 2px solid var(--border-color);
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
            word-break: break-all;
            color: var(--text-color);
        }

        tr:last-child td { border-bottom: none; }

        .score {
            display: inline-block;
            width: 32px;
            text-align: center;
            padding: 4px 0;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85em;
            letter-spacing: 0.5px;
        }
        
        .high { 
            background-color: rgba(16, 185, 129, 0.2); 
            color: #10b981; 
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .mid { 
            background-color: rgba(245, 158, 11, 0.2); 
            color: #f59e0b; 
            border: 1px solid rgba(245, 158, 11, 0.3);
        }
        .low { 
            background-color: rgba(239, 68, 68, 0.2); 
            color: #ef4444; 
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .copy-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 8px; /* PC端保持侧边间距 */
            white-space: nowrap;
            transition: all 0.2s;
        }
        .copy-btn:hover { filter: brightness(1.1); }
        .copy-btn:active { transform: scale(0.95); }

        .ad-footer {
            text-align: center;
            padding: 20px;
            margin-top: auto;
            border-top: 1px solid var(--border-color);
        }
        .ad-link {
            display: inline-block;
            background: var(--primary-color);
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
            transition: all 0.2s;
        }
        .ad-link:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        @media (max-width: 640px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; }
            tr {
                margin-bottom: 15px;
                border: 1px solid var(--border-color);
                border-radius: 8px;
                padding: 10px;
                background: var(--card-bg);
            }
            td {
                border: none;
                position: relative;
                padding-left: 40%;
                text-align: right;
                border-bottom: 1px solid #334155;
                min-height: 40px;
                display: flex;
                align-items: center;
                justify-content: flex-end;
            }
            /* 针对链接单元格的特殊处理 */
            td[data-label="链接"] {
                flex-direction: column; /* 纵向排列 */
                align-items: flex-end;
                padding-top: 12px;
                padding-bottom: 12px;
            }
            td:last-child { border-bottom: none; }
            td:before {
                position: absolute;
                left: 10px;
                width: 35%;
                font-weight: bold;
                text-align: left;
                color: var(--text-muted);
                content: attr(data-label);
            }
            .copy-btn {
                margin-left: 0; /* 取消PC端的左间距 */
                margin-top: 8px; /* 按钮移至下方并增加间距 */
                width: 100px;    /* 移动端固定一个合适的宽度 */
                padding: 8px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>204 真链接测试地址</h1>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>服务提供者</th>
                    <th>链接</th>
                    <th>大陆体验</th>
                    <th>境外体验</th>
                </tr>
            </thead>
            <tbody id="data-table"></tbody>
        </table>
    </div>
</div>

<div class="ad-footer">
    <a href="https://www.youtube.com/@zhenxiangdinglv" target="_blank" class="ad-link">
        YouTube @真香定律
    </a>
</div>

<script>
    const data = [
        {provider: "Google", url: "http://www.gstatic.com/generate_204", cn: 5, intl: 10},
        {provider: "Google", url: "http://www.google-analytics.com/generate_204", cn: 6, intl: 4},
        {provider: "Google", url: "http://www.google.com/generate_204", cn: 0, intl: 10},
        {provider: "Google", url: "http://connectivitycheck.gstatic.com/generate_204", cn: 4, intl: 10},
        {provider: "Apple", url: "http://captive.apple.com", cn: 3, intl: 10},
        {provider: "Apple", url: "http://www.apple.com/library/test/success.html", cn: 7, intl: 10},
        {provider: "MicroSoft", url: "http://www.msftconnecttest.com/connecttest.txt", cn: 5, intl: 10},
        {provider: "Cloudflare", url: "http://cp.cloudflare.com/", cn: 4, intl: 10},
        {provider: "Firefox", url: "http://detectportal.firefox.com/success.txt", cn: 5, intl: 10},
        {provider: "V2ex", url: "http://www.v2ex.com/generate_204", cn: 0, intl: 10},
        {provider: "小米", url: "http://connect.rom.miui.com/generate_204", cn: 10, intl: 4},
        {provider: "华为", url: "http://connectivitycheck.platform.hicloud.com/generate_204", cn: 10, intl: 5},
        {provider: "Vivo", url: "http://wifi.vivo.com.cn/generate_204", cn: 10, intl: 5}
    ];

    function getScoreClass(score) {
        if (score >= 8) return 'high';
        if (score >= 4) return 'mid';
        return 'low';
    }

    const tbody = document.getElementById('data-table');
    data.forEach(item => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td data-label="服务提供者">${item.provider}</td>
            <td data-label="链接">
                <span class="url-text">${item.url}</span>
                <button class="copy-btn" onclick="copyToClipboard('${item.url}', this)">复制</button>
            </td>
            <td data-label="大陆体验">
                <span class="score ${getScoreClass(item.cn)}">${item.cn}</span>
            </td>
            <td data-label="境外体验">
                <span class="score ${getScoreClass(item.intl)}">${item.intl}</span>
            </td>
        `;
        tbody.appendChild(tr);
    });

    async function copyToClipboard(text, btn) {
        try {
            await navigator.clipboard.writeText(text);
            const originalText = btn.innerText;
            btn.innerText = '已复制';
            btn.style.backgroundColor = '#10b981';
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.backgroundColor = '';
            }, 1500);
        } catch (err) {
            alert('复制失败，请手动选择复制');
        }
    }
</script>

</body>
</html>
