name: gslege

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch and Process Data
        run: |
          mkdir -p gslege
          BJ_TIME=$(date -d "+8 hours" "+%m-%d %H:%M")
          HAS_CHANGES=false
          
          # 定义数据源
          declare -A SOURCES=(
            ["https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/Cfxyz.txt"]="Cfxyz.txt"
            ["https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/JP.txt"]="JP.txt"
            ["https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/NL.txt"]="NL.txt"
            ["https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/US.txt"]="US.txt"
            ["https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/DE.txt"]="DE.txt"
            ["https://raw.githubusercontent.com/gslege/CloudflareIP/refs/heads/main/SG.txt"]="SG.txt"
          )

          for URL in "${!SOURCES[@]}"; do
            FILENAME=${SOURCES[$URL]}
            TARGET_FILE="gslege/$FILENAME"
            TMP_NEW="new_${FILENAME}.tmp"
            TMP_OLD="old_${FILENAME}.tmp"
            
            # 初始化临时文件，防止 grep 没匹配到内容导致文件不存在
            touch "$TMP_NEW"

            # 1. 下载并处理数据
            # 增加对空内容的检查
            CONTENT=$(curl -s "$URL")
            if [ -n "$CONTENT" ]; then
              echo "$CONTENT" | grep ":" | while read -r line; do
                ip_port=$(echo "$line" | cut -d'#' -f1)
                echo "$line | $ip_port" >> "$TMP_NEW"
              done
            fi

            # 2. 对比逻辑
            FILE_CHANGED=false
            if [ -f "$TARGET_FILE" ]; then
              # 排除首尾行进行比对
              sed '1d;$d' "$TARGET_FILE" > "$TMP_OLD"
              if ! diff -q "$TMP_OLD" "$TMP_NEW" > /dev/null; then
                FILE_CHANGED=true
                HAS_CHANGES=true
              fi
            else
              # 如果目标文件不存在，且新抓取到了内容，则标记为有变化
              if [ -s "$TMP_NEW" ]; then
                FILE_CHANGED=true
                HAS_CHANGES=true
              fi
            fi

            # 3. 写入文件
            if [ "$FILE_CHANGED" = true ]; then
              echo "saas.sin.fan:443#▼ 优选IP | $BJ_TIME | YouTube@真香定律" > "$TARGET_FILE"
              cat "$TMP_NEW" >> "$TARGET_FILE"
              echo "bestcf.030101.xyz:443#▲ 优选IP | 分享优选网 bestcf.pages.dev | 感谢Gslege" >> "$TARGET_FILE"
              echo "已更新文件: $TARGET_FILE"
            fi
            
            rm -f "$TMP_NEW" "$TMP_OLD"
          done

          echo "has_changes=$HAS_CHANGES" >> $GITHUB_ENV

      - name: Commit and Push
        run: |
          if [ "${{ env.has_changes }}" = "true" ]; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add gslege/*.txt
            git commit -m "gslege update $(date -d "+8 hours" '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push origin main
          else
            echo "所有文件内容均无实质变化，跳过提交。"
          fi